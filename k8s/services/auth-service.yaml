apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: circleguardacr.azurecr.io/circleguard-auth:7
          ports:
            - containerPort: 8180
          env:
            - name: SERVER_PORT
              value: "8180"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/auth_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "circleguard"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "circleguard_pass"
            - name: APP_JWT_SECRET
              value: "my-super-secret-dev-key-32-chars-long-12345678"
            - name: SPRING_LDAP_URLS
              value: "ldap://openldap:389"
            - name: SPRING_LDAP_BASE
              value: "dc=circleguard,dc=local"
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: MANAGEMENT_HEALTH_LDAP_ENABLED
              value: "false"
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service:8083"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8180
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8180
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8180
      targetPort: 8180
